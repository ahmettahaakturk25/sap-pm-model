name: SAP AI Core Docker İmajını Hazırla

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları GitHub'dan Çek
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Modeli Drive'dan İndirmek İçin Gdown Kur
        run: pip install gdown

      - name: Modeli Google Drive'dan İndir
        run: gdown --id 10vVlPhSEeExRuBnvNnOUGjp9vtTEUQFc -O multi_task_bert_model.pth

      - name: Docker Hub'a Giriş Yap
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker İmajını Oluştur ve Docker Hub'a Gönder
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sap-pm-model:latest
